baseURL = "/"
languageCode = "zh-CN"
title = "阿宇说"
theme = "PaperMod"
defaultContentLanguage = "zh"
enableEmoji = true
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "github"
    anchorLineNos = true
    lineNumbersInTable = false
  [markup.goldmark.renderer]
    unsafe = true

[params]
  enableKaTeX = true
  enableCopyCode = true
  enableToc = true
  defaultTheme = "auto"
  showToc = true
  tocOpen = true
  tocSticky = true
  tocThreshold = 2
  
  [params.profileMode]
    enabled = true
    title = "阿宇说"
    subtitle = "深度探讨 | 商业模式 | 认知分享"
    imageUrl = "images/avatar.jpg"
    imageWidth = 120
    imageHeight = 120
  [[params.profileMode.buttons]]
      name = "📝 全部文章"
      url = "/posts/"
  [[params.profileMode.buttons]]
      name = "🏷️ 标签"
      url = "/tags/"

  [[params.profileMode.buttons]]
      name = "ℹ️ 关于我"
      url = "/about/"
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/seeyoumeet"

[[menu.main]]
  identifier = "home"
  name = "🏠 首页"
  url = "/"
  weight = 1
[[menu.main]]
  identifier = "posts"
  name = "📝 文章"
  url = "/posts/"
  weight = 2
[[menu.main]]
  identifier = "categories"
  name = "🏷️ 分类"
  url = "/categories/"
  weight = 3
[[menu.main]]
  identifier = "tags"
  name = "🔖 标签"
  url = "/tags/"
  weight = 4
[[menu.main]]
  identifier = "archives"
  name = "📅 归档"
  url = "/archives/"
  weight = 5
[[menu.main]]
  identifier = "about"
  name = "ℹ️ 关于"
  url = "/about/"
  weight = 6